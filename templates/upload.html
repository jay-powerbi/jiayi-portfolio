{% extends "base.html" %}

{% block title %}{{ _('upload.page_title') }}{% endblock %}

{% block content %}
<div class="scan-page">
    <header class="page-intro">
        <h1>{{ _('upload.title') }}</h1>
        <p>{{ _('upload.subtitle') }}</p>
    </header>
<div class="form-card">
    <form method="post" enctype="multipart/form-data" class="form">
        <div class="upload-zone" id="upload-zone">
            <div class="upload-zone-inner">
                <span class="upload-icon">📷</span>
                <p class="upload-title">{{ _('upload.drop_title') }}</p>
                <p class="upload-hint">{{ _('upload.drop_hint') }}</p>
                <label for="product_image" class="btn btn-secondary btn-sm upload-browse">{{ _('upload.browse') }}</label>
                <input
                    type="file"
                    id="product_image"
                    name="product_image"
                    accept="image/png,image/jpeg,image/gif,image/webp"
                    class="upload-input"
                    required
                >
            </div>
            <div class="upload-preview" id="upload-preview" hidden>
                <img id="preview-image" alt="">
                <p id="preview-filename" class="upload-filename"></p>
                <button type="button" class="btn btn-ghost btn-sm" id="clear-preview">{{ _('upload.choose_different') }}</button>
            </div>
        </div>

        <div class="ai-placeholder-note">
            <span class="ai-badge">AI</span>
            <p>{{ _('upload.ai_note') }}</p>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('scan') }}" class="btn btn-secondary">{{ _('common.cancel') }}</a>
            <button type="submit" class="btn btn-primary">{{ _('upload.continue') }}</button>
        </div>
    </form>
</div>
</div>

<script>
(function () {
    const input = document.getElementById("product_image");
    const zone = document.getElementById("upload-zone");
    const inner = zone.querySelector(".upload-zone-inner");
    const preview = document.getElementById("upload-preview");
    const img = document.getElementById("preview-image");
    const filename = document.getElementById("preview-filename");
    const clearBtn = document.getElementById("clear-preview");

    function showPreview(file) {
        const reader = new FileReader();
        reader.onload = function (e) {
            img.src = e.target.result;
            filename.textContent = file.name;
            inner.hidden = true;
            preview.hidden = false;
            zone.classList.add("upload-zone-has-file");
        };
        reader.readAsDataURL(file);
    }

    input.addEventListener("change", function () {
        if (input.files && input.files[0]) showPreview(input.files[0]);
    });

    clearBtn.addEventListener("click", function () {
        input.value = "";
        inner.hidden = false;
        preview.hidden = true;
        zone.classList.remove("upload-zone-has-file");
    });

    zone.addEventListener("dragover", function (e) {
        e.preventDefault();
        zone.classList.add("upload-zone-dragover");
    });

    zone.addEventListener("dragleave", function () {
        zone.classList.remove("upload-zone-dragover");
    });

    zone.addEventListener("drop", function (e) {
        e.preventDefault();
        zone.classList.remove("upload-zone-dragover");
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            input.files = e.dataTransfer.files;
            showPreview(e.dataTransfer.files[0]);
        }
    });
})();
</script>
{% endblock %}
