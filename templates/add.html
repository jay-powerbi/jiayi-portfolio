{% extends "base.html" %}

{% block title %}{{ _('add.page_title') }}{% endblock %}

{% block content %}
<header class="page-intro">
    <h1>{{ _('add.title') }}</h1>
    <p>{{ _('add.subtitle') }}</p>
</header>

<div class="form-card {% if image_preview %}form-card-with-image{% endif %}">
    {% if image_preview %}
    <div class="form-image-preview">
        <img src="{{ image_preview }}" alt="{{ _('common.product_photo') }}">
        <span class="form-image-label">{{ _('common.product_photo') }}</span>
    </div>
    {% endif %}
    <form method="post" class="form">
        <div class="form-group">
            <label for="product_name">{{ _('add.product_name') }}</label>
            <input
                type="text"
                id="product_name"
                name="product_name"
                placeholder="{{ _('add.product_name_ph') }}"
                value="{{ form.get('product_name', '') }}"
                required
            >
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="store_name">{{ _('add.store_name') }}</label>
                <input
                    type="text"
                    id="store_name"
                    name="store_name"
                    placeholder="{{ _('add.store_name_ph') }}"
                    value="{{ form.get('store_name', '') }}"
                    required
                >
            </div>
            <div class="form-group">
                <label for="price">{{ _('add.price') }}</label>
                <input
                    type="number"
                    id="price"
                    name="price"
                    step="0.01"
                    min="0"
                    placeholder="{{ _('add.price_ph') }}"
                    value="{{ form.get('price', '') }}"
                    required
                >
            </div>
        </div>

        <div class="form-group">
            <label for="product_url">{{ _('add.product_url') }}</label>
            <input
                type="url"
                id="product_url"
                name="product_url"
                placeholder="{{ _('add.product_url_ph') }}"
                value="{{ form.get('product_url', '') }}"
                required
            >
        </div>

        <div class="form-group">
            <label for="target_price">{{ _('add.target_price') }}</label>
            <input
                type="number"
                id="target_price"
                name="target_price"
                step="0.01"
                min="0"
                placeholder="{{ _('add.target_price_ph') }}"
                value="{{ form.get('target_price', '') }}"
            >
            <p class="field-hint">{{ _('add.target_hint') }}</p>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('compare') }}" class="btn btn-secondary">{{ _('common.cancel') }}</a>
            <button type="submit" class="btn btn-primary">{{ _('common.save_price') }}</button>
        </div>
    </form>
</div>
{% endblock %}
