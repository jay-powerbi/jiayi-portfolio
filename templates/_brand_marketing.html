<div class="pp-brand pp-brand--marketing">
    <div class="pp-brand-marketing-top">
        {% include '_brand_icon.html' %}
        <span class="pp-brand-name">{{ _('brand.name') }}</span>
        <span class="pp-brand-ai-badge">AI</span>
    </div>
    <p class="pp-brand-tagline">{{ _('brand.tagline') }}</p>
    <ul class="pp-brand-features" aria-label="{{ _('brand.features_label') }}">
        <li class="pp-brand-feature">
            <span class="pp-brand-feature-icon" aria-hidden="true">🔍</span>
            <span>{{ _('brand.feature_compare') }}</span>
        </li>
        <li class="pp-brand-feature">
            <span class="pp-brand-feature-icon" aria-hidden="true">⭐</span>
            <span>{{ _('brand.feature_watchlist') }}</span>
        </li>
        <li class="pp-brand-feature">
            <span class="pp-brand-feature-icon" aria-hidden="true">🤖</span>
            <span>{{ _('brand.feature_ai') }}</span>
        </li>
        <li class="pp-brand-feature">
            <span class="pp-brand-feature-icon" aria-hidden="true">🔔</span>
            <span>{{ _('brand.feature_alerts') }}</span>
        </li>
    </ul>
</div>
