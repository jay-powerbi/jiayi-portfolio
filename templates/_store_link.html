<a href="{{ url }}" target="_blank" rel="noopener noreferrer" class="store-link{% if compact %} store-link--compact{% endif %}">
    <span class="retailer-logo retailer-logo--inline {{ logo_class }}" aria-hidden="true">{{ logo_text }}</span>
    <span class="store-link-text">
        <span class="store-link-name">{{ store_name }}</span>
        <span class="store-link-arrow" aria-hidden="true">↗</span>
    </span>
</a>
