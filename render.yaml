services:
  - type: web
    name: jiayi-portfolio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /portfolio
    envVars:
      - key: SITE_ROOT
        value: portfolio
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PORTFOLIO_ADMIN_TOKEN
        generateValue: true
      - key: GA4_MEASUREMENT_ID
        value: G-C4PVZ8R1L7
      - key: PORTFOLIO_SITE_URL
        value: https://jiayi-portfolio.onrender.com
